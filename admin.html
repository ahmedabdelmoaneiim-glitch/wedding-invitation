<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إنشاء الدعوة</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; text-align: right; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #8b0032; color: #fff; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #e2f0d9; border: 1px solid #b2d8a3; border-radius: 8px; word-break: break-all; }
    </style>
</head>
<body>

    <h2>تعديل بيانات الدعوة</h2>
    <br>
    <div class="form-group">
        <label>أسماء العروسين (بالإنجليزي أو العربي):</label>
        <input type="text" id="namesInput" value="Ahmed & Hames">
    </div>

    <div class="form-group">
        <label>التاريخ والوقت:</label>
        <input type="text" id="dateInput" value="الخميس 11 / 04 / 2026 - الساعة 8 مساءً">
    </div>

    <div class="form-group">
        <label>اسم القاعة/المكان:</label>
        <input type="text" id="venueInput" value="فندق لاجونا فيستا">
    </div>

    <button onclick="generateLink()">إنشاء رابط الدعوة</button>

    <div class="result" id="resultBox" style="display:none;">
        <p><strong>رابط الدعوة الخاص بك:</strong></p>
        <a id="generatedLink" href="#" target="_blank">افتح الدعوة</a>
    </div>

    <script>
        function generateLink() {
            const names = encodeURIComponent(document.getElementById('namesInput').value);
            const date = encodeURIComponent(document.getElementById('dateInput').value);
            const venue = encodeURIComponent(document.getElementById('venueInput').value);

            const link = `index.html?names=${names}&date=${date}&venue=${venue}`;
            
            document.getElementById('generatedLink').href = link;
            document.getElementById('generatedLink').innerText = window.location.origin + '/' + link;
            document.getElementById('resultBox').style.display = 'block';
        }
    </script>
</body>
</html>
