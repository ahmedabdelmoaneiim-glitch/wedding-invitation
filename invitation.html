<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zohan & Rose Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;600&family=Great+Vibes&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-cream: #fbf8f3;
            --gold: #c5a059;
            --dark-gold: #9e7d3b;
            --text-dark: #2c2520;
            --wax-burgundy: #6b1d2f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cinzel', serif;
        }

        .phone-frame {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            max-height: 896px;
            background: var(--bg-cream);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border-radius: 12px;
        }

        /* ------------------ شاشة الظرف الفاخر ------------------ */
        #envelopeOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ede6da;
            background-image: radial-gradient(#d8ccbc 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, transform 1s ease;
        }

        .envelope-container {
            width: 320px;
            height: 480px;
            position: relative;
            perspective: 1200px;
            cursor: pointer;
        }

        /* الظرف الخلفي والجيب */
        .envelope-base {
            width: 100%;
            height: 100%;
            background: #f4eee5;
            border: 1px solid #dcd1c0;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 30px rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
        }

        /* زخارف نباتية بارزة على الظرف */
        .floral-emboss {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.25;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0 C20 20 20 40 40 40 C60 40 60 20 40 0 Z' fill='%3C%23c5a059%3E'/%3E%3C/svg%3E");
        }

        /* غطاء الظرف العلوي */
        .flap-top {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 240px;
            background: #eae1d3;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border-top: 1px solid #d8cbba;
        }

        /* الختم الشمعي Faux Wax Seal */
        .wax-seal {
            position: absolute;
            top: 210px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background: radial-gradient(circle at 30% 30%, #8b263e, #4a101d);
            border-radius: 50%;
            z-index: 4;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 2px 5px rgba(255,255,255,0.4), inset 0 -3px 5px rgba(0,0,0,0.5);
            border: 3px solid #731d30;
            transition: transform 0.3s ease, opacity 0.5s ease;
        }

        .wax-seal span {
            font-family: 'Great Vibes', cursive;
            color: #f3e5ab;
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .tap-hint {
            position: absolute;
            bottom: 40px;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--gold);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        /* حركات الفتح */
        .opened .flap-top {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .opened .wax-seal {
            opacity: 0;
            transform: translateX(-50%) scale(0.5);
        }

        /* ------------------ محتوى الدعوة السينمائي ------------------ */
        .invitation-body {
            opacity: 0;
            transition: opacity 1s ease 0.5s;
            padding: 30px 20px;
            text-align: center;
        }

        .opened-page .invitation-body {
            opacity: 1;
        }

        /* القوس الزجاجي مع البجع والورود */
        .arch-frame {
            border: 1px solid var(--gold);
            border-radius: 180px 180px 0 0;
            padding: 40px 15px 30px 15px;
            background: linear-gradient(180deg, #f7f1e7 0%, #fbf8f3 100%);
            box-shadow: inset 0 0 15px rgba(197, 160, 89, 0.1);
            margin-bottom: 30px;
            position: relative;
        }

        .wedding-title {
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .couples-names {
            font-family: 'Great Vibes', cursive;
            font-size: 52px;
            color: var(--text-dark);
            margin: 10px 0;
            line-height: 1.1;
        }

        .date-badge {
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 25px;
        }

        /* البجع والورود الرسم بالـ SVG */
        .swan-art {
            width: 140px;
            margin: 0 auto;
            display: block;
        }

        .quran-section {
            margin: 30px 0;
            padding: 0 10px;
        }

        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 22px;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .verse {
            font-family: 'Amiri', serif;
            font-size: 15px;
            line-height: 1.8;
            color: #55483d;
        }

        /* مشغل الصوت الفاخر العائم */
        .audio-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 48px;
            height: 48px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 1000;
            color: white;
            font-size: 18px;
        }

        /* زر RSVP الفاخر */
        .rsvp-btn {
            background: linear-gradient(135deg, #c5a059 0%, #9e7d3b 100%);
            color: #fff;
            border: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(197, 160, 89, 0.4);
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="phone-frame" id="mainFrame">

        <div id="envelopeOverlay">
            <div class="envelope-container" id="envelopeObj" onclick="openEnvelope()">
                <div class="envelope-base">
                    <div class="floral-emboss"></div>
                    <div class="flap-top"></div>
                    <div class="wax-seal">
                        <span>R&Z</span>
                    </div>
                </div>
            </div>
            <div class="tap-hint">TAP TO OPEN</div>
        </div>

        <div class="audio-player" onclick="toggleMusic()" id="musicBtn">🎵</div>
        <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

        <div class="invitation-body">
            
            <div class="arch-frame">
                <div class="wedding-title">WEDDING DAY</div>
                <div class="date-badge">27 . 09 . 2026</div>
                <div class="couples-names">Zohan<br>&<br>Rose</div>
                
                <svg class="swan-art" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M60 70 C70 50, 90 50, 95 70 C80 80, 65 80, 60 70 Z" fill="#c5a059" opacity="0.8"/>
                    <path d="M140 70 C130 50, 110 50, 105 70 C120 80, 135 80, 140 70 Z" fill="#c5a059" opacity="0.8"/>
                    <circle cx="100" cy="80" r="15" fill="#f7f1e7" stroke="#c5a059"/>
                </svg>
                
                <p style="font-size: 11px; letter-spacing: 2px; color: var(--gold); margin-top: 15px;">SCROLL DOWN</p>
            </div>

            <div class="quran-section">
                <div class="bismillah">بسم الله الرحمن الرحيم</div>
                <p class="verse">
                    "وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً"
                </p>
            </div>

            <div style="margin: 40px 0;">
                <button class="rsvp-btn" onclick="alert('شكراً لتأكيد حضورك!')">CONFIRM ATTENDANCE</button>
            </div>

        </div>

    </div>

    <script>
        let music = document.getElementById('bgMusic');
        let isPlaying = false;

        function openEnvelope() {
            const env = document.getElementById('envelopeObj');
            const overlay = document.getElementById('envelopeOverlay');
            const frame = document.getElementById('mainFrame');

            // فتح الغطاء والختم
            env.classList.add('opened');

            // تشغيل الموسيقى تلقائياً
            music.play().then(() => {
                isPlaying = true;
                document.getElementById('musicBtn').innerText = '⏸️';
            }).catch(() => {});

            // اختفاء الشاشة وانتقال للمحتوى
            setTimeout(() => {
                overlay.style.opacity = '0';
                overlay.style.transform = 'scale(1.1)';
                frame.classList.add('opened-page');

                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1000);
            }, 800);
        }

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                document.getElementById('musicBtn').innerText = '🎵';
                isPlaying = false;
            } else {
                music.play();
                document.getElementById('musicBtn').innerText = '⏸️';
                isPlaying = true;
            }
        }
    </script>
</body>
</html>
