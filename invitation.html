<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف - أحمد ومريم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="text-align: center; max-width: 600px;">
        <!-- اسماء العروسين -->
        <h1 style="font-size: 2.8rem; margin-bottom: 5px;">
            أحمد <span style="color: #d4a373;">❤️</span> مريم
        </h1>
        <p style="font-size: 1.3rem; color: #8a7a72;">نتشرف بدعوتكم لحضور حفل زفافنا</p>

        <!-- التاريخ -->
        <div style="background: #f8ede8; border-radius: 20px; padding: 20px; margin: 25px 0;">
            <p style="font-size: 1.1rem; margin-bottom: 5px;">📅 التاريخ</p>
            <p style="font-size: 1.8rem; font-weight: 700;">الجمعة ١٥ أكتوبر ٢٠٢٦</p>
            <p style="font-size: 1.1rem; color: #8a7a72;">الساعة ٨:٠٠ مساءً</p>
        </div>

        <!-- المكان -->
        <div style="margin: 25px 0;">
            <p style="font-size: 1.1rem; margin-bottom: 5px;">📍 المكان</p>
            <p style="font-size: 1.2rem;">قاعة الزفاف الكبرى</p>
            <p style="color: #8a7a72;">القاهرة - مصر</p>
            <a href="https://maps.google.com" target="_blank" class="btn" style="margin-top: 10px; display: inline-block;">🗺️ افتح الخريطة</a>
        </div>

        <!-- عداد تنازلي -->
        <div style="margin: 30px 0;">
            <p style="font-size: 1.1rem;">⏳ متبقي على الفرح</p>
            <div class="countdown">
                <div class="countdown-item">
                    <div class="number" id="days">--</div>
                    <div class="label">أيام</div>
                </div>
                <div class="countdown-item">
                    <div class="number" id="hours">--</div>
                    <div class="label">ساعات</div>
                </div>
                <div class="countdown-item">
                    <div class="number" id="minutes">--</div>
                    <div class="label">دقائق</div>
                </div>
                <div class="countdown-item">
                    <div class="number" id="seconds">--</div>
                    <div class="label">ثواني</div>
                </div>
            </div>
        </div>

        <!-- تأكيد الحضور (RSVP) -->
        <div style="background: white; border-radius: 20px; padding: 25px; margin: 25px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <p style="font-size: 1.2rem; font-weight: 600;">هل ستشاركنا الفرح؟</p>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 15px; flex-wrap: wrap;">
                <button class="btn" onclick="rsvp('حضور')" style="flex: 1; min-width: 120px;">✅ سأحضر</button>
                <button class="btn" onclick="rsvp('اعتذار')" style="flex: 1; min-width: 120px; background: #ccc; box-shadow: none;">❌ سأعتذر</button>
            </div>
            <p id="rsvpMessage" style="margin-top: 15px; font-size: 1.1rem; color: #4a2c1e;"></p>
        </div>

        <!-- موسيقى (اختياري) -->
        <div style="margin: 20px 0;">
            <p style="font-size: 1.1rem;">🎵 استمع لأغنيتنا</p>
            <audio controls style="width: 100%; border-radius: 12px;">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                متصفحك لا يدعم تشغيل الصوت
            </audio>
        </div>

        <script>
            // عداد تنازلي (تاريخ الفرح)
            function startCountdown() {
                const weddingDate = new Date('2026-10-15T20:00:00').getTime();
                const now = new Date().getTime();
                let diff = weddingDate - now;
                
                if (diff < 0) {
                    document.getElementById('days').textContent = '🎉';
                    document.getElementById('hours').textContent = '';
                    document.getElementById('minutes').textContent = '';
                    document.getElementById('seconds').textContent = '';
                    return;
                }
                
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                document.getElementById('days').textContent = days;
                document.getElementById('hours').textContent = hours;
                document.getElementById('minutes').textContent = minutes;
                document.getElementById('seconds').textContent = seconds;
            }
            
            startCountdown();
            setInterval(startCountdown, 1000);

            // RSVP
            function rsvp(status) {
                const msg = document.getElementById('rsvpMessage');
                if (status === 'حضور') {
                    msg.innerHTML = '🎉 نشكرك على تأكيد حضورك! في انتظارك يوم الفرح.';
                    msg.style.color = '#1a7a4a';
                } else {
                    msg.innerHTML = '😔 نشعر بالأسف لاعتذارك، سنفتقدك.';
                    msg.style.color = '#a13a3a';
                }
                // هنا تقدر تضيف كود يخزن الرد في localStorage أو يرسله لسيرفر
            }
        </script>
    </div>
</body>
</html>
