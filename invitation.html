<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة خاصة ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        
        body.theme-pink { background: #fff5f6; color: #4a4a4a; }
        body.theme-pink .card { background: #fff; border: 1px solid #ffb6c1; }
        body.theme-pink .btn { background: #ff4d6d; color: white; }

        body.theme-blue { background: #f0f8ff; color: #1e3a8a; }
        body.theme-blue .card { background: #ffffff; border: 1px solid #93c5fd; }
        body.theme-blue .btn { background: #2563eb; color: white; }

        body.theme-dark { background: #121212; color: #f3e5ab; }
        body.theme-dark .card { background: #1e1e1e; border: 1px solid #d4af37; }
        body.theme-dark .btn { background: #d4af37; color: #121212; }

        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; text-align: center;
        }

        .container { max-width: 450px; margin: 0 auto; padding: 20px; padding-bottom: 100px; text-align: center; }
        .card { border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .names { font-family: 'Great Vibes', cursive; font-size: 2.8rem; margin: 15px 0; color: #d63384; }
        .btn { display: inline-block; padding: 10px 25px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-top: 10px; }

        .music-player {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); border-radius: 30px; padding: 10px 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }
    </style>
</head>
<body class="theme-pink">

    <div id="lockScreen">
        <h2 style="margin-bottom:15px; color:#ff4d6d;">أهلاً بكم ❤️</h2>
        <p style="margin-bottom:15px;">الرجاء إدخال كلمة السر لمشاهدة الدعوة</p>
        <input type="text" id="passInput" style="padding:10px; border-radius:10px; border:1px solid #ccc; text-align:center;" placeholder="كلمة السر">
        <button onclick="checkPass()" style="margin-top:10px; padding:10px 25px; background:#ff4d6d; color:#fff; border:none; border-radius:20px; font-weight:bold;">فتح الدعوة 🔓</button>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <div class="card">
            <h3>يسرنا دعوتكم لحضور حفل زفاف</h3>
            <div class="names" id="invNames">...</div>
            <p id="invDate">...</p>
            <br>
            <p id="invVenue">...</p>
            <a id="invMap" href="#" target="_blank" class="btn">موقع القاعة على الخريطة 📍</a>
        </div>

        <div class="card" id="storyCard" style="display:none;">
            <h3>قصة حبنا ✨</h3>
            <p id="invStory" style="margin-top:10px; line-height:1.6;"></p>
        </div>
    </div>

    <div class="music-player" id="player" style="display:none;">
        <button onclick="toggleAudio()" id="playBtn" style="background:#ff4d6d; color:white; border:none; width:40px; height:40px; border-radius:50%;">▶</button>
        <div><strong style="color:#333;">أغنية الدعوة 🎵</strong></div>
        <audio id="bgAudio" loop></audio>
    </div>

    <script>
        const SUPABASE_URL = "https://dwogzofnirelsuzmcwzl.supabase.co";
        const SUPABASE_KEY = "sb_publishable_bX0oxfKtKrvzMIP_JSFB6w_fKy9SeNg";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentPasscode = "love";

        async function loadInvitation() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('id');

            if(!slug) return alert("رابط غير صحيح!");

            const { data, error } = await _supabase
                .from('invitations')
                .select('*')
                .eq('slug', slug)
                .single();

            if(error || !data) {
                alert("لم يتم العثور على الدعوة!");
                return;
            }

            document.body.className = `theme-${data.theme || 'pink'}`;
            document.getElementById('invNames').innerText = data.groom_bride_names;
            document.getElementById('invDate').innerText = data.event_date;
            document.getElementById('invVenue').innerText = "📍 المكان: " + data.venue;
            document.getElementById('invMap').href = data.map_link || '#';
            document.getElementById('bgAudio').src = data.music_url;
            currentPasscode = data.passcode || 'love';

            if(data.story_text) {
                document.getElementById('storyCard').style.display = 'block';
                document.getElementById('invStory').innerText = data.story_text;
            }
        }

        function checkPass() {
            const input = document.getElementById('passInput').value;
            if(input.toLowerCase() === currentPasscode.toLowerCase()) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('player').style.display = 'flex';
            } else {
                alert("كلمة السر غير صحيحة!");
            }
        }

        function toggleAudio() {
            const audio = document.getElementById('bgAudio');
            const btn = document.getElementById('playBtn');
            if (audio.paused) {
                audio.play();
                btn.innerText = '❚❚';
            } else {
                audio.pause();
                btn.innerText = '▶';
            }
        }

        loadInvitation();
    </script>
</body>
</html>
