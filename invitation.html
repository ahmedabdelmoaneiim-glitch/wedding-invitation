<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض القوالب والتصاميم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Reem+Kufi:wght@500;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #d4af37;
            --bg-dark: #0f172a;
            --font-family: 'Amiri', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 70px 10px 20px 10px;
        }

        /* شريط التبديل بين الأمثلة أعلى الصفحة */
        .demo-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 10px 5px; z-index: 1000;
            display: flex; justify-content: center; gap: 8px; overflow-x: auto;
        }

        .demo-btn {
            background: rgba(255, 255, 255, 0.1); color: #fff;
            border: 1px solid var(--primary); padding: 6px 12px;
            border-radius: 20px; font-family: 'Tajawal', sans-serif;
            font-size: 12px; cursor: pointer; whitespace: nowrap;
        }

        .demo-btn.active {
            background: var(--primary); color: #000; font-weight: bold;
        }

        /* شاشة الظرف */
        #envelopeOverlay {
            position: fixed; top: 50px; left: 0; width: 100%; height: calc(100% - 50px);
            background: var(--bg-dark); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        .envelope-box {
            width: 260px; height: 160px; background: rgba(255,255,255,0.05);
            border: 2px solid var(--primary); border-radius: 16px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.5); margin-bottom: 20px;
        }

        .btn-open-invite {
            background: var(--primary); color: #000; font-family: 'Tajawal', sans-serif;
            font-weight: 800; font-size: 15px; padding: 12px 30px; border-radius: 30px;
            border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* كارت الدعوة */
        .invitation-card {
            position: relative; z-index: 2; width: 100%; max-width: 450px; padding: 30px 20px;
            border: 2px solid var(--primary); border-radius: 24px;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); text-align: center; display: none;
        }

        .couple-names {
            font-family: 'Reem Kufi', sans-serif; font-size: 32px; color: var(--primary); margin: 15px 0;
        }

        .particles-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .particle { position: absolute; color: var(--primary); opacity: 0.7; animation: fall linear infinite; }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        .countdown { display: flex; justify-content: center; gap: 8px; margin: 20px 0; direction: ltr; }
        .time-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--primary);
            padding: 8px; border-radius: 10px; min-width: 55px; font-family: 'Tajawal', sans-serif;
        }
        .time-card span { display: block; font-size: 18px; font-weight: bold; color: var(--primary); }

        .btn-action {
            display: inline-flex; align-items: center; justify-content: center; width: 100%;
            background: var(--primary); color: #000; font-weight: bold; font-family: 'Tajawal', sans-serif;
            padding: 12px; border-radius: 30px; text-decoration: none; margin-top: 10px; border: none; cursor: pointer;
        }

        .rsvp-section { margin-top: 25px; padding-top: 20px; border-top: 1px dashed rgba(255,255,255,0.2); font-family: 'Tajawal', sans-serif; text-align: right; }
        .rsvp-section h3 { text-align: center; color: var(--primary); font-size: 16px; margin-bottom: 12px; }
        .form-input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; outline: none; font-size: 13px; }
    </style>
</head>
<body>

    <!-- شريط التبديل السريع بين الأمثلة للعميل -->
    <div class="demo-bar">
        <button class="demo-btn active" onclick="loadPreset('royal')">👑 1. الملكي الذهبي</button>
        <button class="demo-btn" onclick="loadPreset('floral')">🌸 2. الرواد الوردي</button>
        <button class="demo-btn" onclick="loadPreset('modern')">🌿 3. الزمردي المودرن</button>
        <button class="demo-btn" onclick="loadPreset('classic')">🍷 4. النبيتي الكلاسيك</button>
        <button class="demo-btn" onclick="loadPreset('lavender')">💜 5. اللافندر الناعم</button>
    </div>

    <!-- شاشة الظرف الافتتاحية -->
    <div id="envelopeOverlay">
        <div class="envelope-box">
            <span id="envelopeIcon" style="font-size: 40px;">✉️</span>
            <p id="envelopeTitle" style="font-family: 'Tajawal'; color: var(--primary); margin-top: 10px; font-weight: bold;">دعوة زفاف خاصة</p>
        </div>
        <button class="btn-open-invite" onclick="openEnvelope()">✨ افتح الدعوة ✨</button>
    </div>

    <div class="particles-container" id="particles"></div>

    <!-- كارت الدعوة -->
    <div class="invitation-card" id="cardContent">
        <p style="color: var(--primary); font-size: 16px;">✨ بسم الله الرحمن الرحيم ✨</p>
        <p style="margin-top: 5px; color: #cbd5e1;" id="welcomeSub">يتشرفان بدعوتكم لحضور حفل الزفاف</p>
        
        <h1 class="couple-names" id="namesDisplay">...</h1>
        
        <p id="dateDisplay" style="font-size: 16px; color: #e2e8f0;">...</p>
        <p id="venueDisplay" style="color: var(--primary); font-weight: bold; margin-top: 5px;">...</p>

        <div class="countdown">
            <div class="time-card"><span id="days">00</span><label style="font-size:10px;">يوم</label></div>
            <div class="time-card"><span id="hours">00</span><label style="font-size:10px;">ساعة</label></div>
            <div class="time-card"><span id="minutes">00</span><label style="font-size:10px;">دقيقة</label></div>
            <div class="time-card"><span id="seconds">00</span><label style="font-size:10px;">ثانية</label></div>
        </div>

        <button id="musicToggle" class="btn-action" style="background:transparent; color:var(--primary); border:1px solid var(--primary);" onclick="toggleAudio()">🎵 تشغيل الموسيقى</button>
        <a id="mapBtn" href="https://maps.google.com" target="_blank" class="btn-action">📍 موقع الحفل على الخريطة</a>

        <div class="rsvp-section">
            <h3>✉️ تأكيد الحضور (RSVP)</h3>
            <form id="rsvpForm">
                <input type="text" id="guest_name" class="form-input" placeholder="اسمك الكريم *" required>
                <select id="is_attending" class="form-input">
                    <option value="true">👍 يسعدني الحضور</option>
                    <option value="false">👎 أعتذر عن الحضور</option>
                </select>
                <input type="number" id="attending_count" class="form-input" placeholder="عدد المرافقين" value="1" min="1">
                <button type="submit" class="btn-action">تأكيد الإجابة</button>
            </form>
            <p id="rsvpSuccess" style="display:none; color: #4ade80; text-align: center; margin-top: 10px;">تم تسجيل ردك بنجاح! ❤️</p>
        </div>
    </div>

    <audio id="bgMusic" loop></audio>

<script>
    // قاعدة بيانات الأمثلة الخمسة
    const presets = {
        royal: {
            bg: "#0f172a", primary: "#d4af37", names: "أحـمـد & ســارة",
            date: "الخميس، 15 أكتوبر 2026", venue: "فندق الفورسيزونز - القاعة الملكية",
            particle: "✨", icon: "✉️"
        },
        floral: {
            bg: "#2a1b24", primary: "#f472b6", names: "يـوسـف & نــور",
            date: "الجمعة، 20 نوفمبر 2026", venue: "فندق ماريوت - القاعة المفتوحة",
            particle: "🌸", icon: "💌"
        },
        modern: {
            bg: "#062c24", primary: "#34d399", names: "عـمـر & مـنـى",
            date: "السبت، 5 ديسمبر 2026", venue: "دار المدفعية - القاعة الرئيسية",
            particle: "🍃", icon: "🌿"
        },
        classic: {
            bg: "#3b0764", primary: "#e879f9", names: "كـريـم & هـديـر",
            date: "الخميس، 10 يناير 2027", venue: "فندق هيلتون - صالة الأحلام",
            particle: "💎", icon: "💍"
        },
        lavender: {
            bg: "#1e1b4b", primary: "#a78bfa", names: "مـصـطـفى & مـار يـه",
            date: "الجمعة، 18 فبراير 2027", venue: "منتجع النخيل - الشاطئ الخاص",
            particle: "✨", icon: "🕊️"
        }
    };

    let currentPreset = 'royal';

    function loadPreset(key) {
        currentPreset = key;
        const p = presets[key];

        // تحديث الأزرار النشطة
        document.querySelectorAll('.demo-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // تطبيق الألوان والتأثيرات
        document.documentElement.style.setProperty('--bg-dark', p.bg);
        document.documentElement.style.setProperty('--primary', p.primary);
        document.body.style.backgroundColor = p.bg;

        document.getElementById('namesDisplay').innerText = p.names;
        document.getElementById('dateDisplay').innerText = p.date;
        document.getElementById('venueDisplay').innerText = p.venue;
        document.getElementById('envelopeIcon').innerText = p.icon;

        // إعادة تشغيل تساقط الأشكال
        initParticles(p.particle);

        // إرجاع الشاشة للظرف لو أحب العميل
        document.getElementById('envelopeOverlay').style.display = 'flex';
        document.getElementById('cardContent').style.display = 'none';
    }

    function openEnvelope() {
        document.getElementById('envelopeOverlay').style.display = 'none';
        document.getElementById('cardContent').style.display = 'block';
    }

    function initParticles(symbol = '✨') {
        const container = document.getElementById('particles');
        container.innerHTML = '';
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle'; p.innerText = symbol;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 3 + 3) + 's';
            container.appendChild(p);
        }
    }

    function initCountdown() {
        const target = new Date("2026-12-31T20:00:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            if (diff > 0) {
                document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
                document.getElementById('hours').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
                document.getElementById('minutes').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                document.getElementById('seconds').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            }
        }, 1000);
    }

    // التشغيل الأول
    initParticles('✨');
    initCountdown();
</script>
</body>
</html>
