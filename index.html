<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #0b1d3a, #1a3a5f);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        h3 { color: #d4af37; font-size: 1.2rem; margin-bottom: 10px; }
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            color: #f3e5ab;
            margin: 15px 0;
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        p { font-size: 1.1rem; line-height: 1.8; margin-bottom: 15px; color: #e0e0e0; }
        .date-box {
            background: #d4af37;
            color: #0b1d3a;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            background: #d4af37;
            color: #0b1d3a;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="card">
        <h3>يسرنا دعوتكم لحضور حفل زفاف</h3>
        <h1 id="names">Ahmed & Hames</h1>
        <p id="message">يتشرفان بدعوتكم لمشاركتهما أجمل لحظات العمر</p>
        
        <div class="date-box" id="date">
            الخميس 11 / 04 / 2026 - الساعة 8:00 مساءً
        </div>

        <p id="venue">📍 المكان: فندق لاجونا فيستا</p>

        <a href="https://maps.google.com" target="_blank" class="btn" id="mapLink">موقع القاعة على الخريطة</a>
    </div>

    <script>
        // كود بسيط يستقبل البيانات الديناميكية المكتوبة في لوحة التحكم
        const params = new URLSearchParams(window.location.search);
        if(params.get('names')) document.getElementById('names').innerText = params.get('names');
        if(params.get('date')) document.getElementById('date').innerText = params.get('date');
        if(params.get('venue')) document.getElementById('venue').innerText = '📍 المكان: ' + params.get('venue');
    </script>
</body>
</html>
